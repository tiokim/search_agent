<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Search Agent</title>
  <link rel="stylesheet" href="style.css?v=3" />
  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
</head>
<body>

  <!-- 토큰 입력 화면 -->
  <div id="auth-screen">
    <div class="auth-box">
      <h1>Search Agent</h1>
      <p class="subtitle">액세스 토큰을 입력하세요</p>
      <div class="auth-form">
        <input id="token-input" type="password" placeholder="토큰 입력..." autocomplete="current-password" />
        <button onclick="submitToken()">입력</button>
      </div>
      <div class="token-error" id="token-error"></div>
    </div>
  </div>

  <!-- 메인 앱 화면 -->
  <div id="app" style="display:none; width:100%; display:none">

    <h1>Search Agent</h1>
    <p class="subtitle">키워드를 입력하면 AI가 검색하고 요약해드립니다</p>

    <div class="search-box">
      <input id="keyword-input" type="text" placeholder="검색할 키워드를 입력하세요..." />
      <button id="search-btn" onclick="startSearch()">검색</button>
    </div>

    <div class="steps" id="steps" style="display:none">
      <div class="step" id="step-search">
        <span class="dot"></span> 웹 검색
      </div>
      <div class="step" id="step-summarize">
        <span class="dot"></span> AI 요약
      </div>
    </div>

    <div class="notice-msg" id="notice-msg"></div>
    <div class="error-msg" id="error-msg"></div>

    <div class="card" id="result-card">
      <div class="card-label">요약 결과</div>
      <div id="summary-output"></div>
      <div class="sources" id="sources-section">
        <div class="sources-label">검색 출처</div>
        <div id="sources-list"></div>
      </div>
    </div>

    <button class="token-change-btn" onclick="logout()" title="토큰 변경">
      <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="7.5" cy="15.5" r="5.5"/><path d="m21 2-9.6 9.6"/><path d="m15.5 7.5 3 3L22 7l-3-3"/>
      </svg>
      토큰 변경
    </button>

  </div>

  <script>
    const API_BASE = '';  // nginx가 /search/* 요청을 백엔드로 프록시

    marked.setOptions({ breaks: true, gfm: true });

    // ── 화면 전환 ──
    const authScreen = document.getElementById('auth-screen');
    const appScreen  = document.getElementById('app');
    const tokenInput = document.getElementById('token-input');
    const tokenError = document.getElementById('token-error');

    function getToken() { return localStorage.getItem('accessToken'); }

    function showAuth(msg = '') {
      tokenError.textContent = msg;
      tokenInput.value = '';
      authScreen.style.display = 'flex';
      appScreen.style.display  = 'none';
      setTimeout(() => tokenInput.focus(), 50);
    }

    function showApp() {
      authScreen.style.display = 'none';
      appScreen.style.display  = 'block';
    }

    function submitToken() {
      const t = tokenInput.value.trim();
      if (!t) return;
      localStorage.setItem('accessToken', t);
      showApp();
    }

    function logout() {
      localStorage.removeItem('accessToken');
      showAuth();
    }

    tokenInput.addEventListener('keydown', e => { if (e.key === 'Enter') submitToken(); });

    // 페이지 로드 시 토큰 확인
    if (getToken()) { showApp(); } else { showAuth(); }

    // ── 검색 앱 ──
    const input          = document.getElementById('keyword-input');
    const btn            = document.getElementById('search-btn');
    const steps          = document.getElementById('steps');
    const stepSearch     = document.getElementById('step-search');
    const stepSummarize  = document.getElementById('step-summarize');
    const resultCard     = document.getElementById('result-card');
    const summaryOutput  = document.getElementById('summary-output');
    const sourcesSection = document.getElementById('sources-section');
    const sourcesList    = document.getElementById('sources-list');
    const errorMsg       = document.getElementById('error-msg');
    const noticeMsg      = document.getElementById('notice-msg');

    const CURSOR_HTML = '<span class="cursor"></span>';

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') startSearch();
    });

    function setStep(node, state) {
      const el = node === 'search' ? stepSearch : stepSummarize;
      el.classList.remove('active', 'done', 'retry');
      if (state) el.classList.add(state);
    }

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.classList.add('visible');
    }

    function showNotice(msg) {
      noticeMsg.textContent = msg;
      noticeMsg.classList.add('visible');
    }

    function hideNotice() {
      noticeMsg.classList.remove('visible');
      noticeMsg.textContent = '';
    }

    function reset() {
      errorMsg.classList.remove('visible');
      hideNotice();
      resultCard.classList.remove('visible');
      sourcesSection.classList.remove('visible');
      summaryOutput.innerHTML = '';
      sourcesList.innerHTML = '';
      setStep('search', null);
      setStep('summarize', null);
    }

    function renderMarkdown(text, withCursor = true) {
      summaryOutput.innerHTML = marked.parse(text) + (withCursor ? CURSOR_HTML : '');
    }

    function renderSources(raw) {
      const blocks = raw.split(/\n(?=\[\d+\])/).filter(b => b.trim());
      const items = blocks.map(block => {
        const numMatch   = block.match(/^\[(\d+)\]/);
        const urlMatch   = block.match(/출처:\s*(\S+)/);
        const titleLines = block
          .replace(/^\[\d+\]\s*/, '')
          .replace(/\n출처:.*$/, '')
          .split('\n').map(l => l.trim()).filter(Boolean);
        return {
          num  : numMatch   ? numMatch[1]   : '',
          title: titleLines[0] || '',
          url  : urlMatch   ? urlMatch[1]   : '',
        };
      });

      sourcesList.innerHTML = items.map(({ num, title, url }) => `
        <div class="source-item">
          <span class="source-num">${num ? `[${num}]` : ''}</span>
          <div class="source-content">
            <a class="source-title" href="${url}" target="_blank" rel="noopener">${title || url}</a>
            <span class="source-url">${url}</span>
          </div>
        </div>
      `).join('');

      if (items.length) sourcesSection.classList.add('visible');
    }

    async function startSearch() {
      const keyword = input.value.trim();
      if (!keyword) { input.focus(); return; }

      reset();
      btn.disabled = true;
      steps.style.display = 'flex';

      let summaryText = '';

      try {
        const res = await fetch(`${API_BASE}/search/stream`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${getToken()}`,
          },
          body: JSON.stringify({ keyword }),
        });

        if (res.status === 401) {
          localStorage.removeItem('accessToken');
          showAuth('토큰이 올바르지 않습니다. 다시 입력해주세요.');
          return;
        }
        if (!res.ok) throw new Error(`서버 오류: ${res.status}`);

        const reader  = res.body.getReader();
        const decoder = new TextDecoder();
        let   buffer  = '';

        resultCard.classList.add('visible');
        summaryOutput.innerHTML = CURSOR_HTML;

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop();

          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            let event;
            try { event = JSON.parse(line.slice(6)); } catch { continue; }

            if (event.type === 'status') {
              if (event.node === 'search') {
                hideNotice();
                setStep('search', 'active');
              } else if (event.node === 'summarize') {
                hideNotice();
                setStep('search', 'done');
                setStep('summarize', 'active');
              } else if (event.node === 'retry') {
                if (stepSearch.classList.contains('active')) setStep('search', 'retry');
                else if (stepSummarize.classList.contains('active')) setStep('summarize', 'retry');
                showNotice(event.message);
              }
            }

            else if (event.type === 'reset') {
              summaryText = '';
              summaryOutput.innerHTML = CURSOR_HTML;
              hideNotice();
            }

            else if (event.type === 'chunk') {
              summaryText += event.content;
              renderMarkdown(summaryText, true);
            }

            else if (event.type === 'done') {
              setStep('summarize', 'done');
              hideNotice();
              renderMarkdown(summaryText, false);
              renderSources(event.search_results);
            }

            else if (event.type === 'error') {
              showError(event.message);
              steps.style.display = 'none';
            }
          }
        }
      } catch (err) {
        showError(err.message || '요청 중 오류가 발생했습니다.');
        steps.style.display = 'none';
      } finally {
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
